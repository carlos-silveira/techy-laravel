name: Deploy Laravel to cPanel via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔍 Debug Environment
        run: |
          pwd
          ls -la
          which php
          which composer
          php -v
          composer -V

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install Dependencies
        run: |
          rm -f composer.lock
          composer update --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs --no-scripts --no-plugins

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Install NPM Dependencies & Build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          npm install --legacy-peer-deps --prefer-offline --no-audit
          npm run build


      - name: 🚀 Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: 21098
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/home/baifywfnnq/techynews.lat/"
          rm: false
          strip_components: 0
          overwrite: true
          exclude: |
            .git/
            .github/
            node_modules/
            .env
            storage/
            bootstrap/cache/
            tests/
            phpunit.xml
            README.md
            .gemini/
            .venv/
            public/storage

      - name: 🔐 Comprehensive Permission Reset & Artisan Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: 21098
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/baifywfnnq/techynews.lat
            find . -type d -exec chmod 755 {} +
            find . -type f -exec chmod 644 {} +
            chmod -R 775 storage bootstrap/cache
            /opt/alt/php85/usr/bin/php artisan migrate --force
            /opt/alt/php85/usr/bin/php artisan storage:fix
            /opt/alt/php85/usr/bin/php artisan optimize
            crontab -l 2>/dev/null | grep -v "artisan schedule:run" | crontab -
            (crontab -l 2>/dev/null; echo "* * * * * cd /home/baifywfnnq/techynews.lat && /opt/alt/php85/usr/bin/php artisan schedule:run >> /dev/null 2>&1") | crontab -

      - name: 🔍 Health Check — Verify Key Pages Return 200
        run: |
          check() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$1")
            if [ "$STATUS" != "200" ]; then
              echo "❌ $1 returned HTTP $STATUS"
              exit 1
            fi
            echo "✅ $1 → $STATUS"
          }
          check https://techynews.lat/
          check https://techynews.lat/about
          check https://techynews.lat/archive
          check https://techynews.lat/login
          check https://techynews.lat/sitemap.xml
          check https://techynews.lat/feed
          check https://techynews.lat/llms.txt

      - name: 🛠️ Debug Production Error Logs on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- last 50 lines of production log ---"
            tail -n 50 /home/baifywfnnq/techynews.lat/storage/logs/laravel.log || echo "log file not found"
            /opt/alt/php85/usr/bin/php artisan --version


