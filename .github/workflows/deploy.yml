name: Deploy Laravel to cPanel via FTP

on:
  push:
    branches:
      - main # Change this to the branch you want to deploy from (e.g., master)

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Update this to match your Laravel version
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, libxml, json, phar
          coverage: none

      - name: 📦 Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Update to match your requirements

      - name: 🏗️ Install NPM Dependencies & Build
        run: |
          npm install
          npm run build

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /techynews.lat/ # Assuming you will deploy exactly to this folder
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env.example
            tests/
            phpunit.xml
            README.md
