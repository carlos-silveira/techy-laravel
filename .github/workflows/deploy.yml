name: Deploy Laravel to cPanel via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, libxml, json, phar
          coverage: none

      - name: 📦 Install PHP Dependencies
        run: composer update --no-interaction --prefer-dist --optimize-autoloader

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Install NPM Dependencies & Build
        run: |
          npm ci
          npm run build


      - name: 🚀 Deploy via rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avzr --delete"
          EXCLUDE: "/.git/, /node_modules/, /.env, /storage/, /bootstrap/cache/, /tests/, phpunit.xml, README.md, .github/"
          SOURCE: "./"
          REMOTE_HOST: "66.29.148.140"
          REMOTE_USER: "baifywfnnq"
          REMOTE_PORT: "21098"
          TARGET: "/home/baifywfnnq/techynews.lat/"

      - name: 🔐 Comprehensive Permission Reset
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/baifywfnnq/techynews.lat
            # Reset all dirs to 755 and files to 644 (Safe for LiteSpeed/cPanel)
            find . -type d -exec chmod 755 {} +
            find . -type f -exec chmod 644 {} +
            # Re-ensure Laravel writable perms
            chmod -R 775 storage bootstrap/cache
            echo "✅ Global permissions reset"
            
            echo "✅ Permissions and directories ensured"

      - name: 🗄️ Run Migrations & Clear Caches on Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/baifywfnnq/techynews.lat
            /opt/alt/php85/usr/bin/php artisan migrate --force
            /opt/alt/php85/usr/bin/php artisan db:seed --class=AdminUserSeeder --force
            /opt/alt/php85/usr/bin/php artisan articles:reset-stats
            /opt/alt/php85/usr/bin/php artisan storage:fix
            /opt/alt/php85/usr/bin/php artisan config:clear
            /opt/alt/php85/usr/bin/php artisan cache:clear
            /opt/alt/php85/usr/bin/php artisan view:clear
            /opt/alt/php85/usr/bin/php artisan route:cache
            echo "✅ Production migrations & cache clear complete"

      - name: ⏰ Setup Laravel Scheduler Cron Job
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Remove any existing Laravel scheduler cron, then add fresh
            crontab -l 2>/dev/null | grep -v "artisan schedule:run" | crontab -
            (crontab -l 2>/dev/null; echo "* * * * * cd /home/baifywfnnq/techynews.lat && /opt/alt/php85/usr/bin/php artisan schedule:run >> /dev/null 2>&1") | crontab -
            echo "✅ Laravel scheduler cron registered"
            crontab -l | grep schedule

      - name: 🌐 Check Web Server PHP Version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "<?php echo 'Web PHP: ' . PHP_VERSION;" > /home/baifywfnnq/techynews.lat/public/php_version_test.php
            curl -s https://techynews.lat/php_version_test.php
            rm /home/baifywfnnq/techynews.lat/public/php_version_test.php

      - name: 🔍 Health Check — Verify Key Pages Return 200
        run: |
          check() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$1")
            if [ "$STATUS" != "200" ]; then
              echo "❌ $1 returned HTTP $STATUS"
              exit 1
            fi
            echo "✅ $1 → $STATUS"
          }
          check https://techynews.lat/
          check https://techynews.lat/about
          check https://techynews.lat/archive
          check https://techynews.lat/login
          check https://techynews.lat/forgot-password

      - name: 🛠️ Debug Production Error Logs on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- last 50 lines of production log ---"
            tail -n 50 /home/baifywfnnq/techynews.lat/storage/logs/laravel.log || echo "log file not found"
            echo "--- php version ---"
            php -v
