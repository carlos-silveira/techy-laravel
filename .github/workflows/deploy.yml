name: Deploy Laravel to cPanel via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, libxml, json, phar
          coverage: none

      - name: 📦 Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Install NPM Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: 🧪 Validate Migrations on Test DB First
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/baifywfnnq/techynews.lat
            DB_DATABASE=baifywfnnq_laravel_test php artisan migrate --force
            echo "✅ Test DB migrations passed — safe to deploy to production"

      - name: 🚀 Deploy via rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avzr --delete"
          EXCLUDE: "/.git/, /node_modules/, /.env, /storage/, /bootstrap/cache/, /tests/, phpunit.xml, README.md, .github/"
          SOURCE: "./"
          REMOTE_HOST: "66.29.148.140"
          REMOTE_USER: "baifywfnnq"
          REMOTE_PORT: "21098"
          TARGET: "/home/baifywfnnq/techynews.lat/"

      - name: 🗄️ Run Migrations & Clear Caches on Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/baifywfnnq/techynews.lat
            php artisan migrate --force
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan route:cache
            echo "✅ Production migrations & cache clear complete"
