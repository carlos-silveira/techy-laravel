name: Deploy Laravel to cPanel via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, libxml, json, phar
          coverage: none

      - name: 📦 Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs --no-dev

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🏗️ Install NPM Dependencies & Build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          npm install --legacy-peer-deps --prefer-offline --no-audit
          npm run build


      - name: 🚀 Deploy via rsync (Pure Shell)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > deploy_key
          chmod 600 deploy_key
          rsync -avzr --delete -e "ssh -p 21098 -i deploy_key -o StrictHostKeyChecking=no" ./ baifywfnnq@66.29.148.140:techynews.lat/ \
            --exclude="/.git/" \
            --exclude="/.github/" \
            --exclude="/node_modules/" \
            --exclude="/.env" \
            --exclude="/storage/" \
            --exclude="/bootstrap/cache/" \
            --exclude="/tests/" \
            --exclude="phpunit.xml" \
            --exclude="README.md" \
            --exclude="/.gemini/" \
            --exclude="/.venv/" \
            --exclude="/public/storage"

      - name: 🔐 Comprehensive Permission Reset & Artisan Commands
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > deploy_key
          chmod 600 deploy_key
          ssh -p 21098 -i deploy_key -o StrictHostKeyChecking=no baifywfnnq@66.29.148.140 << 'EOF'
            cd techynews.lat
            find . -type d -exec chmod 755 {} +
            find . -type f -exec chmod 644 {} +
            chmod -R 775 storage bootstrap/cache
            /opt/alt/php85/usr/bin/php artisan migrate --force
            /opt/alt/php85/usr/bin/php artisan storage:fix
            /opt/alt/php85/usr/bin/php artisan optimize
            crontab -l 2>/dev/null | grep -v "artisan schedule:run" | crontab -
            (crontab -l 2>/dev/null; echo "* * * * * cd /home/baifywfnnq/techynews.lat && /opt/alt/php85/usr/bin/php artisan schedule:run >> /dev/null 2>&1") | crontab -
          EOF

      - name: 🔍 Health Check — Verify Key Pages Return 200
        run: |
          check() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$1")
            if [ "$STATUS" != "200" ]; then
              echo "❌ $1 returned HTTP $STATUS"
              exit 1
            fi
            echo "✅ $1 → $STATUS"
          }
          check https://techynews.lat/
          check https://techynews.lat/about
          check https://techynews.lat/archive
          check https://techynews.lat/login
          check https://techynews.lat/sitemap.xml
          check https://techynews.lat/feed
          check https://techynews.lat/llms.txt

      - name: 🛠️ Debug Production Error Logs on Failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "66.29.148.140"
          username: "baifywfnnq"
          port: "21098"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- last 50 lines of production log ---"
            tail -n 50 /home/baifywfnnq/techynews.lat/storage/logs/laravel.log || echo "log file not found"
            /opt/alt/php85/usr/bin/php artisan --version


