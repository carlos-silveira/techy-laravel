version: '3.8'

services:
  app:
    container_name: techy-app-dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
      - "5173:5173" # Vite HMR
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: techy_dev
      DB_USERNAME: dev_user
      DB_PASSWORD: dev_password
    depends_on:
      - db
    networks:
      - techy-network

  db:
    container_name: techy-db-dev
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: techy_dev
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "33066:3306"
    networks:
      - techy-network

networks:
  techy-network:
    driver: bridge
